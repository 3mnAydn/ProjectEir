server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/eir_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

jwt:
  secret: "RWlyUHJvamVjdFN1cGVyU2VjcmV0S2V5Rm9ySnd0VG9rZW5zMjAyNiEhIQ=="
  access-token-expiration: 900000
  refresh-token-expiration: 2592000000
